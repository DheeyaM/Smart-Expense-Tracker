<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <section class="page">
        <header class="header"> <h1>Expense Tracker</h1></header>
        <div class="layout">
        <aside class="summary">
            <!-- Summary Cards -->
            <div id="balanceCard">
                <h3 id="balanceValue">Balance:</h3>

            </div>
            <div id="incomeCard">
                <h3 id="incomeValue">Income:</h3>
            </div>
            <div id="expenseCard">
                <h3 id="expenseValue">Expense:</h3>
            </div>
            <div id="foodCard">
               <button id="foodbtn" class="category-btn"> Food:      R</button>
            </div>
            <div id="transportCard">
                <button id="transportbtn"class="category-btn"> Transport: R</button>
            </div>
            <div id="entertainmentCard">
                <button id="entertainmentbtn"class="category-btn"> Entertainment: R</button>
            </div>
            <div id="personalCard">
                <button id="personalbtn"class="category-btn"> Personal: R</button>
            </div>
            <div id="otherCard">
                <button id="otherbtn"class="category-btn"> Other: R</button>
            </div>
            <div id="savingsCard">
                <button id="savingsbtn"class="category-btn"> Savings: R</button>
            </div>
            
        </aside>
        <div class="content">
        <main class="main">
            <h2>Add Transaction</h2>
            <label for="descriptionInput">Description</label>
            <input type="text" name="descriptionInput"  class="inputbox" id="descriptionInput">
            <label for="amountInput">Amount</label>
            <input type="text" name="amountInput" class="inputbox" id="amountInput">
            <select name="category" id="category">
                <option value="" selected>Select Category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Personal">Personal</option>
                <option value="Other">Other</option>
                <option value="Savings">Savings</option>
            </select>
            <div class="addbtn-section">
            <button class="addbtn"  id="expense"> Expense</button>
            <button class="addbtn" id="income"> Income</button>
            </div>
        </main>
        <section class="list">
            <h4>Transaction list</h4>
            <ul id="transactionList"></ul>
        </section>
        </div>
        </div>
        <div>
            <canvas id="myChart"></canvas>
        </div>
    </section>
</body>
</html>
